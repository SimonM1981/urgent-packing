<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT PACKING</title>
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial; padding:20px; }
    h1 { color:#ef4444; text-align:center; }
    table { width:100%; border-collapse:collapse; background:#1f1f1f; }
    th, td { padding:12px; border:1px solid #444; text-align:left; font-size: 14px; }
    th { background:#222; color:#888; text-transform:uppercase; font-size:11px; }
    .btn { background:#22c55e; color:black; padding:8px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
    .status-tag { padding:4px 6px; border-radius:4px; font-size:11px; font-weight:bold; text-transform:uppercase;}
    .urgent { background:#de2121; } .laser { background:#f59e0b; color:000; }
    .packing { background:#3b82f6; } .packed { background:#10b981; color:000; }
  </style>
</head>
<body>

  <h1>🚨 URGENT PACKING</h1>

  <table>
    <thead>
      <tr>
        <th>DATE (Col B)</th>
        <th>P/I No.</th>
        <th>PARTS No.</th>
        <th>QTY</th>
        <th>TEAM</th>
        <th>STATUS</th>
        <th>ACTION</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <script>
    const URL = "PASTE_YOUR_NEW_DEPLOYMENT_URL_HERE";

    async function load() {
      const res = await fetch(URL);
      const jobs = await res.json();
      let html = "";

      jobs.forEach(job => {
        const st = (job.Status || "Urgent").toLowerCase();
        // Use the numeric rawId we created in the .gs file
        const uid = job.rawId; 
        
        let btn = "";
        if (st === "urgent") btn = `<button class="btn" onclick="update('${uid}', 'laser')">→ Laser</button>`;
        else if (st === "laser") btn = `<button class="btn" onclick="update('${uid}', 'packing')">→ Packing</button>`;
        else if (st === "packing") btn = `<button class="btn" onclick="update('${uid}', 'packed')">→ Packed</button>`;
        else btn = "✅ Done";

        html += `<tr>
          <td style="color:#666; font-size:12px">${job.displayDate || ''}</td>
          <td>${job['P/I No.'] || ''}</td>
          <td style="color:#60a5fa; font-weight:bold">${job['PARTS No.'] || ''}</td>
          <td>${job["Q'TY"] || ''}</td>
          <td>${job.Team || ''}</td>
          <td><span class="status-tag ${st}">${st}</span></td>
          <td>${btn}</td>
        </tr>`;
      });
      document.getElementById("table-body").innerHTML = html;
    }

    async function update(id, nextStatus) {
      if (!confirm("Move to " + nextStatus + "?")) return;
      // Force a simple GET request for the update to avoid CORS issues
      const updateUrl = `${URL}?action=update&id=${id}&status=${nextStatus}`;
      
      try {
        const res = await fetch(updateUrl);
        const result = await res.json();
        if(result.status === "success") {
          alert("Updated!");
          load();
        } else {
          alert("Error: " + result.error);
        }
      } catch (e) {
        // If it fails due to redirect, wait 1 sec and reload
        setTimeout(load, 1000);
      }
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
