<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT PACKING</title>
  <style>
    body { 
      background: #0a0a0a; 
      color: white; 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 20px; 
    }
    h1 { color: #ef4444; text-align: center; }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      background: #1f1f1f; 
      margin-top: 20px; 
    }
    th, td { 
      padding: 12px; 
      border: 1px solid #444; 
      text-align: left; 
    }
    th { background: #222; }
    tr:hover { background: #2a2a2a; }
    button { 
      background: #22c55e; 
      color: black; 
      border: none; 
      padding: 10px 18px; 
      border-radius: 8px; 
      font-weight: bold; 
      cursor: pointer; 
    }
    .filter-btn {
      margin: 5px;
      padding: 8px 16px;
      background: #444;
      border: none;
      border-radius: 8px;
      color: white;
    }
    .active { background: #ef4444 !important; }
  </style>
</head>
<body>

  <h1>🚨 URGENT PACKING</h1>
  <p style="text-align:center; color:#aaa;">Add jobs in Google Sheet • Status starts as "urgent"</p>

  <div id="filters" style="text-align:center; margin:15px 0;"></div>

  <table>
    <thead>
      <tr>
        <th>P/I No.</th>
        <th>PARTS No.</th>
        <th>CUSTOMER No.</th>
        <th>Q'TY</th>
        <th>TEAM</th>
        <th>STATUS</th>
        <th>ACTION</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxK-VVvzX92Bc24X-PHYOe1TKjah9c3ICqsYZzOl-TzWRUJDbQFYySBM7uyev9NqQuf/exec";

    let jobs = [];
    let currentFilter = "all";

    async function loadData() {
      try {
        const response = await fetch(WEB_APP_URL + "?method=GET");
        jobs = await response.json();
        renderTable();
        renderFilters();
      } catch (err) {
        console.error(err);
        alert("Cannot load data from Google Sheet");
      }
    }

    function renderFilters() {
      let html = `<button class="filter-btn ${currentFilter==='all' ? 'active' : ''}" onclick="setFilter('all')">ALL TEAMS</button>`;
      for (let t of ['A','B','C','D','E','F','G','H']) {
        html += `<button class="filter-btn ${currentFilter===t ? 'active' : ''}" onclick="setFilter('${t}')">TEAM ${t}</button>`;
      }
      document.getElementById("filters").innerHTML = html;
    }

    function setFilter(team) {
      currentFilter = team;
      renderFilters();
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById("data");
      tbody.innerHTML = "";

      let filtered = jobs;
      if (currentFilter !== "all") {
        filtered = jobs.filter(j => (j.Team || j.team) === currentFilter);
      }

      filtered.forEach(job => {
        const status = (job.Status || job.status || "urgent").toLowerCase();
        let nextBtn = "";

        if (status === "urgent") {
          nextBtn = `<button onclick="updateStatus('${job.ID || job.id}', 'laser')">→ Send to Laser</button>`;
        } else if (status === "laser") {
          nextBtn = `<button onclick="updateStatus('${job.ID || job.id}', 'packing')">→ Under Packing</button>`;
        } else if (status === "packing") {
          nextBtn = `<button onclick="updateStatus('${job.ID || job.id}', 'packed')">→ Packed</button>`;
        } else {
          nextBtn = "✓ Completed";
        }

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${job['P/I No.'] || ''}</td>
          <td><b>${job['PARTS No.'] || ''}</b></td>
          <td>${job['CUSTOMER No.'] || ''}</td>
          <td style="text-align:center">${job["Q'TY"] || ''}</td>
          <td style="text-align:center">${job.Team || job.team || '—'}</td>
          <td style="text-align:center">${status.toUpperCase()}</td>
          <td style="text-align:center">${nextBtn}</td>
        `;
        tbody.appendChild(row);
      });
    }

    async function updateStatus(id, newStatus) {
      if (!confirm("Change status to next step?")) return;

      try {
        await fetch(WEB_APP_URL + `?method=POST&action=update&id=${id}&status=${newStatus}`);
        alert("✅ Status Updated!");
        loadData();
      } catch (err) {
        alert("Failed to update. Check internet.");
      }
    }

    // Start
    loadData();
    setInterval(loadData, 7000);
  </script>
</body>
</html>
