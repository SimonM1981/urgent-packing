<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT PACKING</title>
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial, sans-serif; padding:20px; margin:0; }
    h1 { color:#ef4444; text-align:center; letter-spacing: 2px; }
    table { width:100%; border-collapse:collapse; background:#1f1f1f; margin-top:20px; }
    th, td { padding:12px; border:1px solid #444; text-align:left; }
    th { background:#222; color:#aaa; font-size:12px; text-transform:uppercase; }
    tr:hover { background:#292929; }
    
    .btn { background:#22c55e; color:black; padding:8px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
    .btn:disabled { background:#444; opacity:0.5; }
    
    .status-tag { padding:4px 8px; border-radius:4px; font-size:11px; font-weight:bold; }
    .urgent { background:#de2121; color:white; }
    .laser { background:#f59e0b; color:black; }
    .packing { background:#3b82f6; color:white; }
    .packed { background:#10b981; color:black; }
  </style>
</head>
<body>

  <h1>🚨 URGENT PACKING LIST</h1>

  <table>
    <thead>
      <tr>
        <th>P/I No.</th>
        <th>PARTS No.</th>
        <th>CUSTOMER</th>
        <th>QTY</th>
        <th>TEAM</th>
        <th>STATUS</th>
        <th>ACTION</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="7" style="text-align:center">Fetching latest data...</td></tr>
    </tbody>
  </table>

  <script>
    // 1. PASTE YOUR NEW DEPLOYMENT URL HERE
    const URL = "https://script.google.com/macros/s/AKfycbxK-VVvzX92Bc24X-PHYOe1TKjah9c3ICqsYZzOl-TzWRUJDbQFYySBM7uyev9NqQuf/exec";

    async function load() {
      try {
        const res = await fetch(URL);
        const jobs = await res.json();
        let html = "";

        jobs.forEach(job => {
          const st = (job.Status || "Urgent").toLowerCase();
          const timestampId = job.Timestamp; // This is our "ID"
          
          let actionBtn = "";
          if (st === "urgent") {
            actionBtn = `<button class="btn" onclick="update('${timestampId}', 'laser')">→ Send to Laser</button>`;
          } else if (st === "laser") {
            actionBtn = `<button class="btn" onclick="update('${timestampId}', 'packing')">→ Start Packing</button>`;
          } else if (st === "packing") {
            actionBtn = `<button class="btn" onclick="update('${timestampId}', 'packed')">→ Mark Packed</button>`;
          } else {
            actionBtn = "✅ Done";
          }

          html += `<tr>
            <td>${job['P/I No.'] || ''}</td>
            <td><b>${job['PARTS No.'] || ''}</b></td>
            <td>${job['CUSTOMER No.'] || ''}</td>
            <td>${job["Q'TY"] || ''}</td>
            <td>${job.Team || ''}</td>
            <td><span class="status-tag ${st}">${st.toUpperCase()}</span></td>
            <td>${actionBtn}</td>
          </tr>`;
        });
        document.getElementById("table-body").innerHTML = html;
      } catch (e) {
        console.error(e);
      }
    }

    async function update(tsId, nextStatus) {
      if (!confirm("Move to " + nextStatus.toUpperCase() + "?")) return;
      
      // We send the Timestamp as the ID parameter
      const updateUrl = `${URL}?action=update&id=${encodeURIComponent(tsId)}&status=${nextStatus}`;
      
      try {
        await fetch(updateUrl);
        // We don't strictly wait for the JSON response because GAS redirects often cause "errors" 
        // even when the data saves successfully.
        alert("✅ Updated!");
        load(); 
      } catch (err) {
        load();
      }
    }

    // Load on start and every 20 seconds
    load();
    setInterval(load, 20000);
  </script>
</body>
</html>
