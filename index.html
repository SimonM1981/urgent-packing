<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT PACKING A-H</title>
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial, sans-serif; padding:10px; margin:0; padding-bottom: 110px; }
    .header-ctrl { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
    .date-input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; font-size: 16px; }
    
    .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; overflow-x: auto; border-top: 1px solid #333; z-index: 100; }
    .nav button { flex: 0 0 65px; padding: 15px 5px; border: none; background: transparent; color: #666; font-weight: bold; cursor: pointer; font-size: 11px; }
    .nav button.active { color: #22c55e; border-bottom: 3px solid #22c55e; background: #1a1a1a; }

    table { width:100%; border-collapse:collapse; background:#151515; font-size: 11px; }
    th, td { padding: 10px 5px; border: 1px solid #222; text-align:left; }
    th { background:#111; color:#555; text-transform:uppercase; font-size:9px; }
    
    .btn-action { background:#22c55e; color:black; padding:8px 2px; border:none; border-radius:4px; font-weight:bold; width:100%; cursor:pointer; font-size: 10px; }
    .status-tag { padding:3px; border-radius:3px; font-size:8px; font-weight:bold; display:block; text-align:center; text-transform:uppercase; margin-bottom:4px; }
    .urgent { background:#7f1d1d; color:#fca5a5; } .laser { background:#92400e; color:#fcd34d; } 
    .packing { background:#1e40af; color:#bfdbfe; } .packed { background:#065f46; color:#a7f3d0; }
  </style>
</head>
<body>

  <div class="header-ctrl">
    <input type="date" id="dateFilter" class="date-input" onchange="render()">
    <p style="margin: 8px 0 0 0; font-size: 13px;">TEAM: <span id="current-team-label" style="color:#22c55e; font-weight:bold;">ALL</span></p>
  </div>

  <table>
    <thead>
      <tr>
        <th>P/I NO.</th>
        <th>PARTS / QTY</th>
        <th style="text-align:center">TEAM</th>
        <th style="text-align:center">STATUS</th>
        <th>ACTION</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <div class="nav">
    <button onclick="filterTeam('ALL')" id="btn-ALL" class="active">ALL</button>
    <button onclick="filterTeam('A')" id="btn-A">A</button>
    <button onclick="filterTeam('B')" id="btn-B">B</button>
    <button onclick="filterTeam('C')" id="btn-C">C</button>
    <button onclick="filterTeam('D')" id="btn-D">D</button>
    <button onclick="filterTeam('E')" id="btn-E">E</button>
    <button onclick="filterTeam('F')" id="btn-F">F</button>
    <button onclick="filterTeam('G')" id="btn-G">G</button>
    <button onclick="filterTeam('H')" id="btn-H">H</button>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbzLICg8R6pwS62NkB5Nr4WSnxzatNpbDZTnnPR4FTulzqHia0QzKpS0WYgkCukBmaSw/exec";
    let allData = [];
    let currentTeam = 'ALL';
    document.getElementById('dateFilter').valueAsDate = new Date();

    async function load() {
      try {
        const res = await fetch(URL);
        allData = await res.json();
        render();
      } catch (e) { console.error("Error"); }
    }

    function filterTeam(team) {
      currentTeam = team;
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + team).classList.add('active');
      document.getElementById('current-team-label').innerText = team;
      render();
    }

    function render() {
      const selectedDate = document.getElementById('dateFilter').value;
      const filtered = allData.filter(j => (currentTeam === 'ALL' || j.team == currentTeam) && j.displayDate === selectedDate);
      let html = "";

      if (filtered.length === 0) {
        html = `<tr><td colspan="5" style="text-align:center; padding:20px; color:#444;">No data found.</td></tr>`;
      } else {
        filtered.forEach(job => {
          const st = (job.status || "Urgent").toLowerCase();
          let btn = (st === "packed") ? "✅" : `<button class="btn-action" onclick="update('${job.rawId}', '${st === 'urgent' ? 'laser' : st === 'laser' ? 'packing' : 'packed'}')">NEXT</button>`;

          html += `<tr>
            <td>${job.pi}</td>
            <td>
                <b style="color:#60a5fa">${job.parts}</b><br>
                <span style="color:#fff; font-weight:bold;">QTY: ${job.qty}</span><br>
                <span style="color:#888; font-size:10px">${job.customer}</span>
            </td>
            <td style="text-align:center; font-weight:bold; color:#fbbf24">${job.team}</td>
            <td><span class="status-tag ${st}">${st}</span></td>
            <td>${btn}</td>
          </tr>`;
        });
      }
      document.getElementById("table-body").innerHTML = html;
    }

    async function update(id, nextStatus) {
      if (!confirm("Move to " + nextStatus.toUpperCase() + "?")) return;
      try {
        await fetch(`${URL}?action=update&id=${id}&status=${nextStatus}`);
        load();
      } catch (e) { load(); }
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
