<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT - Packing</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #1a1a1a;
    }
    body {
      background: var(--bg);
      color: white;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #333; padding: 14px; text-align: left; }
    tr:hover { background-color: #222; }
    .btn {
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .status-urgent { background: #dc2626; }
    .status-laser { background: #eab308; }
    .status-packing { background: #8b5cf6; }
    .status-packed { background: #16a34a; }
  </style>
</head>
<body>

  <div style="max-width: 1400px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #dc2626; padding-bottom: 15px;">
      <h1 style="font-size: 2.5rem; font-weight: bold; color: #dc2626;">🚨 URGENT PACKING</h1>
      <div style="text-align: right;">
        <p style="color: #888;">Live from Google Sheet</p>
        <p id="datetime" style="font-family: monospace; font-size: 1.1rem;"></p>
      </div>
    </div>

    <!-- Team Filters -->
    <div id="teamFilters" style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px;"></div>

    <!-- Table -->
    <div style="background: #1a1a1a; border-radius: 16px; overflow: auto;">
      <table>
        <thead>
          <tr style="background: #222;">
            <th>P/I No.</th>
            <th>PARTS No.</th>
            <th>CUSTOMER No.</th>
            <th style="text-align:center">Q'TY</th>
            <th style="text-align:center">TEAM</th>
            <th style="text-align:center">CURRENT STATUS</th>
            <th style="text-align:center">NEXT ACTION</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxK-VVvzX92Bc24X-PHYOe1TKjah9c3ICqsYZzOl-TzWRUJDbQFYySBM7uyev9NqQuf/exec";

    const steps = [
      { id: 'urgent', name: 'Urgent', class: 'status-urgent' },
      { id: 'laser', name: 'Send to Laser', class: 'status-laser' },
      { id: 'packing', name: 'Under Packing', class: 'status-packing' },
      { id: 'packed', name: 'Packed', class: 'status-packed' }
    ];

    let jobs = [];
    let currentFilter = 'all';

    async function fetchJobs() {
      try {
        const res = await fetch(`${WEB_APP_URL}?method=GET`);
        jobs = await res.json();
        renderTable();
        renderTeamFilters();
      } catch (e) {
        console.error(e);
        alert("Cannot connect to Google Sheet. Check internet.");
      }
    }

    function renderTeamFilters() {
      const container = document.getElementById('teamFilters');
      let html = `<button onclick="filterByTeam('all')" class="btn" style="background:${currentFilter==='all'?'#dc2626':'#333'}">ALL TEAMS</button>`;
      
      ['A','B','C','D','E','F','G','H'].forEach(team => {
        html += `<button onclick="filterByTeam('${team}')" class="btn" style="background:${currentFilter===team?'#dc2626':'#333'}">TEAM ${team}</button>`;
      });
      container.innerHTML = html;
    }

    function filterByTeam(team) {
      currentFilter = team;
      renderTeamFilters();
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      let filtered = jobs;
      if (currentFilter !== 'all') {
        filtered = jobs.filter(j => (j.Team || j.team) === currentFilter);
      }

      filtered.forEach(job => {
        const status = (job.Status || job.status || 'urgent').toString().toLowerCase().trim();
        const stepIndex = steps.findIndex(s => s.id === status);
        const nextStep = stepIndex < 3 ? steps[stepIndex + 1] : null;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td style="font-family:monospace">${job['P/I No.'] || ''}</td>
          <td style="font-weight:bold">${job['PARTS No.'] || ''}</td>
          <td>${job['CUSTOMER No.'] || ''}</td>
          <td style="text-align:center; font-weight:bold">${job["Q'TY"] || job.qty || ''}</td>
          <td style="text-align:center">
            <span style="background:#333; padding:4px 12px; border-radius:9999px; font-size:0.85rem">${job.Team || job.team || '—'}</span>
          </td>
          <td style="text-align:center">
            <span class="${steps[stepIndex].class}" style="padding:8px 20px; border-radius:9999px; color:white; font-weight:bold">
              ${steps[stepIndex].name}
            </span>
          </td>
          <td style="text-align:center">
            ${nextStep ? `
              <button onclick="moveToStep('${job.ID || job.id}', '${nextStep.id}')" 
                      style="background:#16a34a; color:white; padding:10px 20px; border-radius:12px; font-weight:bold; border:none; cursor:pointer;">
                → ${nextStep.name}
              </button>
            ` : `<span style="color:#4ade80; font-weight:bold">✓ COMPLETED</span>`}
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    async function moveToStep(jobId, newStatus) {
      if (!confirm(`Move to "${steps.find(s => s.id === newStatus).name}"?`)) return;

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: "update",
            id: jobId,
            status: newStatus,
            lastNote: `Moved to ${newStatus}`
          })
        });
        fetchJobs();
      } catch (e) {
        alert("Update failed. Please check connection.");
      }
    }

    // Auto refresh
    setInterval(fetchJobs, 6000);

    // Clock
    setInterval(() => {
      document.getElementById('datetime').textContent = new Date().toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }, 1000);

    fetchJobs();
  </script>
</body>
</html>
