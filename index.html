<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT - Packing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .card { transition: all 0.3s; }
    .card:hover { transform: scale(1.03); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-red-600 pb-4">
      <h1 class="text-4xl font-bold text-red-500 tracking-widest">🚨 URGENT</h1>
      <div class="text-right">
        <p class="text-sm text-gray-400">Live Google Sheets Sync</p>
        <p id="datetime" class="font-mono text-lg"></p>
      </div>
    </div>

    <div class="flex gap-3 mb-6 flex-wrap">
      <button onclick="addNewJob()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl font-bold flex items-center gap-2">
        <i class="fas fa-plus"></i> NEW JOB
      </button>
      <button onclick="refreshData()" class="bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl font-bold">
        🔄 Refresh
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="board"></div>
  </div>

  <!-- New Job Modal -->
  <div id="newJobModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-md mx-4">
      <h2 class="text-2xl font-bold mb-6">New Urgent Job</h2>
      <input id="piNo" placeholder="P/I No." class="w-full mb-3 p-4 bg-gray-800 rounded-xl text-white">
      <input id="partsNo" placeholder="PARTS No." class="w-full mb-3 p-4 bg-gray-800 rounded-xl text-white">
      <input id="customerNo" placeholder="CUSTOMER No." class="w-full mb-3 p-4 bg-gray-800 rounded-xl text-white">
      <input id="qty" type="number" placeholder="Q'TY" class="w-full mb-6 p-4 bg-gray-800 rounded-xl text-white">
      
      <div class="flex gap-3">
        <button onclick="createJob()" class="flex-1 bg-red-600 py-4 rounded-xl font-bold">Create Job</button>
        <button onclick="closeModal()" class="flex-1 bg-gray-700 py-4 rounded-xl font-bold">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Move Modal -->
  <div id="moveModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-md mx-4">
      <h3 id="modalTitle" class="text-xl font-bold mb-4"></h3>
      <textarea id="confirmNote" rows="3" class="w-full p-4 bg-gray-800 rounded-xl text-white" placeholder="Type confirmation note here..."></textarea>
      
      <div class="mt-6 flex gap-3">
        <button onclick="confirmMove()" class="flex-1 bg-green-600 py-4 rounded-xl font-bold">Confirm & Move</button>
        <button onclick="closeMoveModal()" class="flex-1 bg-gray-700 py-4 rounded-xl font-bold">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBFG1h8s7WytKNsOOk_WEmFx0rBkG6CW1aQSJ8UivvTtzWgEzWsKupVhhMPWwz0ZFx/exec";

    const steps = [
      { id: 'collected', name: 'Collected', color: 'border-blue-500' },
      { id: 'laser', name: 'Send to Laser', color: 'border-yellow-500' },
      { id: 'packing', name: 'Under Packing', color: 'border-purple-500' },
      { id: 'packed', name: 'Packed', color: 'border-green-500' }
    ];

    let jobs = [];

    async function fetchJobs() {
      try {
        const res = await fetch(`${WEB_APP_URL}?method=GET`);
        jobs = await res.json();
        renderBoard();
      } catch (e) {
        console.error(e);
        alert("Cannot connect to Google Sheet. Please check your internet.");
      }
    }

    function renderBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      steps.forEach(step => {
        const columnJobs = jobs.filter(j => (j.Status || j.status) === step.id);

        const colHTML = `
          <div class="bg-gray-900 rounded-2xl p-4 border-t-4 ${step.color}">
            <h2 class="font-bold text-lg mb-4 flex items-center justify-between">
              ${step.name}
              <span class="text-sm bg-black/50 px-3 py-1 rounded-full">${columnJobs.length}</span>
            </h2>
            <div class="space-y-3 min-h-[400px]" id="col-${step.id}"></div>
          </div>`;
        
        board.innerHTML += colHTML;
      });

      steps.forEach(step => {
        const container = document.getElementById(`col-${step.id}`);
        const columnJobs = jobs.filter(j => (j.Status || j.status) === step.id);
        
        columnJobs.forEach(job => {
          const card = document.createElement('div');
          card.className = `card bg-gray-800 p-5 rounded-2xl cursor-pointer border border-gray-700`;
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <div class="text-red-400 font-mono text-sm">${job['P/I No.'] || job.piNo || ''}</div>
                <div class="font-bold text-lg">${job['PARTS No.'] || job.partsNo || ''}</div>
              </div>
              <span class="px-3 py-1 text-xs font-bold bg-gray-700 rounded-full">${job.Team || job.team || '—'}</span>
            </div>
            <div class="mt-4 text-sm text-gray-300">
              Customer: ${job['CUSTOMER No.'] || job.customerNo || ''}<br>
              Q'TY: <strong>${job['Q\'TY'] || job.qty || ''}</strong>
            </div>
            ${job['Last Note'] || job.lastNote ? `<div class="mt-3 text-xs italic text-gray-400">"${job['Last Note'] || job.lastNote}"</div>` : ''}
          `;
          card.onclick = () => openMoveModal(job.ID || job.id, job.Status || job.status);
          container.appendChild(card);
        });
      });
    }

    function addNewJob() { document.getElementById('newJobModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('newJobModal').classList.add('hidden'); }

    async function createJob() {
      const data = {
        piNo: document.getElementById('piNo').value.trim(),
        partsNo: document.getElementById('partsNo').value.trim(),
        customerNo: document.getElementById('customerNo').value.trim(),
        qty: document.getElementById('qty').value
      };

      if (!data.piNo || !data.partsNo || !data.customerNo || !data.qty) {
        return alert("Please fill all fields!");
      }

      await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "add", ...data })
      });

      closeModal();
      fetchJobs();
    }

    let currentJobId = null;
    let nextStatus = null;

    function openMoveModal(jobId, currentStatus) {
      currentJobId = jobId;
      const idx = steps.findIndex(s => s.id === currentStatus);
      if (idx === 3) return alert("This job is already Packed!");

      nextStatus = steps[idx + 1].id;
      const job = jobs.find(j => (j.ID || j.id) === jobId);
      
      document.getElementById('modalTitle').textContent = 
        `${job['PARTS No.'] || job.partsNo} → ${steps[idx+1].name}`;
      
      document.getElementById('moveModal').classList.remove('hidden');
    }

    function closeMoveModal() {
      document.getElementById('moveModal').classList.add('hidden');
      document.getElementById('confirmNote').value = '';
    }

    async function confirmMove() {
      const note = document.getElementById('confirmNote').value.trim();
      if (!note) return alert("Confirmation note is required!");

      const team = prompt("Enter your Team Letter (A-H):").toUpperCase().trim();
      if (!"ABCDEFGH".includes(team)) return alert("Please enter A to H only.");

      await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: "update",
          id: currentJobId,
          status: nextStatus,
          team: team,
          lastNote: note,
          note: note
        })
      });

      closeMoveModal();
      fetchJobs();
    }

    function refreshData() {
      fetchJobs();
    }

    // Auto refresh every 8 seconds
    setInterval(fetchJobs, 8000);

    // Clock
    setInterval(() => {
      document.getElementById('datetime').textContent = new Date().toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }, 1000);

    // Load data when page opens
    fetchJobs();
  </script>
</body>
</html>
