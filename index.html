<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT - Packing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    table { border-collapse: collapse; }
    th, td { border: 1px solid #374151; }
    tr:hover { background-color: #1f2937; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-red-600 pb-4">
      <h1 class="text-4xl font-bold text-red-500">🚨 URGENT PACKING</h1>
      <div class="text-right">
        <p class="text-sm text-gray-400">Live from Google Sheet</p>
        <p id="datetime" class="font-mono"></p>
      </div>
    </div>

    <!-- Team Filter -->
    <div class="flex gap-2 mb-6 flex-wrap" id="teamFilters">
      <!-- Generated by JS -->
    </div>

    <!-- Main Table -->
    <div class="overflow-x-auto bg-gray-900 rounded-2xl shadow-xl">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-800">
            <th class="p-4 text-left">P/I No.</th>
            <th class="p-4 text-left">PARTS No.</th>
            <th class="p-4 text-left">CUSTOMER No.</th>
            <th class="p-4 text-center">Q'TY</th>
            <th class="p-4 text-center">TEAM</th>
            <th class="p-4 text-center">CURRENT STATUS</th>
            <th class="p-4 text-center">NEXT ACTION</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="text-gray-300"></tbody>
      </table>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBFG1h8s7WytKNsOOk_WEmFx0rBkG6CW1aQSJ8UivvTtzWgEzWsKupVhhMPWwz0ZFx/exec";

    const steps = [
      { id: 'urgent', name: 'Urgent', color: 'bg-red-600' },
      { id: 'laser', name: 'Send to Laser', color: 'bg-yellow-600' },
      { id: 'packing', name: 'Under Packing', color: 'bg-purple-600' },
      { id: 'packed', name: 'Packed', color: 'bg-green-600' }
    ];

    let jobs = [];
    let currentFilter = 'all';

    async function fetchJobs() {
      try {
        const res = await fetch(`${WEB_APP_URL}?method=GET`);
        jobs = await res.json();
        renderTable();
        renderTeamFilters();
      } catch (e) {
        console.error(e);
      }
    }

    function renderTeamFilters() {
      const container = document.getElementById('teamFilters');
      let html = `<button onclick="filterByTeam('all')" class="px-5 py-2 rounded-xl font-bold ${currentFilter==='all' ? 'bg-red-600' : 'bg-gray-700'}">ALL TEAMS</button>`;
      
      const teams = ['A','B','C','D','E','F','G','H'];
      teams.forEach(team => {
        html += `<button onclick="filterByTeam('${team}')" class="px-5 py-2 rounded-xl font-bold ${currentFilter===team ? 'bg-red-600' : 'bg-gray-700'}">TEAM ${team}</button>`;
      });
      container.innerHTML = html;
    }

    function filterByTeam(team) {
      currentFilter = team;
      renderTeamFilters();
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      let filtered = jobs;
      if (currentFilter !== 'all') {
        filtered = jobs.filter(j => (j.Team || j.team) === currentFilter);
      }

      filtered.forEach(job => {
        const status = (job.Status || job.status || 'urgent').toLowerCase().trim();
        const stepIndex = steps.findIndex(s => s.id === status);
        const nextStep = stepIndex < 3 ? steps[stepIndex + 1] : null;

        const row = document.createElement('tr');
        row.className = "border-b border-gray-700 hover:bg-gray-800";
        row.innerHTML = `
          <td class="p-4 font-mono">${job['P/I No.'] || ''}</td>
          <td class="p-4 font-bold">${job['PARTS No.'] || ''}</td>
          <td class="p-4">${job['CUSTOMER No.'] || ''}</td>
          <td class="p-4 text-center font-bold">${job["Q'TY"] || job.qty || ''}</td>
          <td class="p-4 text-center">
            <span class="px-4 py-1 bg-gray-700 rounded-full text-xs">${job.Team || job.team || '—'}</span>
          </td>
          <td class="p-4 text-center">
            <span class="px-6 py-2 rounded-xl text-white text-sm font-bold ${steps[stepIndex].color}">
              ${steps[stepIndex].name}
            </span>
          </td>
          <td class="p-4 text-center">
            ${nextStep ? `
              <button onclick="moveToStep('${job.ID || job.id}', '${nextStep.id}')" 
                      class="bg-green-600 hover:bg-green-700 px-5 py-2.5 rounded-xl text-sm font-bold transition">
                → ${nextStep.name}
              </button>
            ` : `<span class="text-green-400 font-bold text-sm">COMPLETED</span>`}
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    async function moveToStep(jobId, newStatus) {
      if (!confirm(`Move to "${steps.find(s => s.id === newStatus).name}" ?`)) return;

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: "update",
            id: jobId,
            status: newStatus,
            team: "",           // No team required
            lastNote: `Moved to ${newStatus}`,
            note: `Status updated`
          })
        });
        fetchJobs();
      } catch (e) {
        alert("Failed to update. Please check connection.");
      }
    }

    // Auto refresh
    setInterval(fetchJobs, 6000);

    // Clock
    setInterval(() => {
      document.getElementById('datetime').textContent = new Date().toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }, 1000);

    // Start
    fetchJobs();
  </script>
</body>
</html>
