<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT PACKING</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 14px;
      border: 1px solid #333;
      text-align: left;
    }
    th { background: #222; }
    tr:hover { background: #222; }
    .btn {
      padding: 12px 20px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    .status { padding: 8px 16px; border-radius: 9999px; font-weight: bold; }
  </style>
</head>
<body>

  <h1 style="color:#ef4444; text-align:center; font-size:2.5rem;">🚨 URGENT PACKING</h1>
  <p style="text-align:center; color:#888;">Add jobs in Google Sheet • Status starts with "urgent"</p>

  <div id="teamFilters" style="margin:20px 0; text-align:center;"></div>

  <table>
    <thead>
      <tr>
        <th>P/I No.</th>
        <th>PARTS No.</th>
        <th>CUSTOMER No.</th>
        <th>Q'TY</th>
        <th>TEAM</th>
        <th>CURRENT STATUS</th>
        <th>NEXT ACTION</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxK-VVvzX92Bc24X-PHYOe1TKjah9c3ICqsYZzOl-TzWRUJDbQFYySBM7uyev9NqQuf/exec";

    const steps = [
      { id: 'urgent', name: 'Urgent' },
      { id: 'laser', name: 'Send to Laser' },
      { id: 'packing', name: 'Under Packing' },
      { id: 'packed', name: 'Packed' }
    ];

    let jobs = [];
    let currentFilter = 'all';

    async function fetchJobs() {
      try {
        const res = await fetch(WEB_APP_URL + "?method=GET");
        jobs = await res.json();
        renderTable();
        renderFilters();
      } catch(e) {
        alert("Cannot load data");
      }
    }

    function renderFilters() {
      let html = `<button onclick="filterByTeam('all')" style="margin:5px; padding:10px 16px; background:${currentFilter==='all'?'#ef4444':'#444'}">ALL</button>`;
      ['A','B','C','D','E','F','G','H'].forEach(t => {
        html += `<button onclick="filterByTeam('${t}')" style="margin:5px; padding:10px 16px; background:${currentFilter===t?'#ef4444':'#444'}">TEAM ${t}</button>`;
      });
      document.getElementById('teamFilters').innerHTML = html;
    }

    function filterByTeam(team) {
      currentFilter = team;
      renderFilters();
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      let list = jobs;
      if (currentFilter !== 'all') {
        list = jobs.filter(j => (j.Team || j.team) === currentFilter);
      }

      list.forEach(job => {
        const status = (job.Status || job.status || 'urgent').toLowerCase();
        const idx = steps.findIndex(s => s.id === status);
        const next = idx < 3 ? steps[idx+1] : null;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${job['P/I No.'] || ''}</td>
          <td><b>${job['PARTS No.'] || ''}</b></td>
          <td>${job['CUSTOMER No.'] || ''}</td>
          <td style="text-align:center">${job["Q'TY"] || ''}</td>
          <td style="text-align:center">${job.Team || job.team || '—'}</td>
          <td style="text-align:center">${steps[idx].name}</td>
          <td style="text-align:center">
            ${next ? `<button class="btn" onclick="move('${job.ID || job.id}', '${next.id}')">→ ${next.name}</button>` : '✓ Done'}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function move(id, newStatus) {
      if (!confirm("Change status?")) return;

      try {
        const url = WEB_APP_URL + `?method=POST&action=update&id=${id}&status=${newStatus}`;
        await fetch(url, { method: 'GET' });   // Using GET parameter for simplicity
        alert("Updated! Refreshing...");
        fetchJobs();
      } catch(e) {
        alert("Failed to update");
      }
    }

    setInterval(fetchJobs, 7000);
    fetchJobs();
  </script>
</body>
</html>
