<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT PACKING</title>
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial; padding:20px; margin:0; }
    table { width:100%; border-collapse:collapse; background:#1f1f1f; }
    th, td { padding:12px; border:1px solid #444; }
    th { background:#222; }
    tr:hover { background:#292929; }
    button { background:#22c55e; color:black; padding:10px 16px; border:none; border-radius:8px; font-weight:bold; }
  </style>
</head>
<body>
  <h1 style="color:#ef4444; text-align:center;">🚨 URGENT PACKING</h1>

  <table>
    <thead>
      <tr>
        <th>P/I No.</th>
        <th>PARTS No.</th>
        <th>CUSTOMER</th>
        <th>Q'TY</th>
        <th>TEAM</th>
        <th>STATUS</th>
        <th>ACTION</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbxK-VVvzX92Bc24X-PHYOe1TKjah9c3ICqsYZzOl-TzWRUJDbQFYySBM7uyev9NqQuf/exec";

    async function load() {
      const res = await fetch(URL + "?method=GET");
      const jobs = await res.json();
      let html = "";
      jobs.forEach(job => {
        const st = (job.Status || "urgent").toLowerCase();
        let btn = "";
        if (st === "urgent") btn = `<button onclick="go('${job.ID || job.id}', 'laser')">→ Send to Laser</button>`;
        else if (st === "laser") btn = `<button onclick="go('${job.ID || job.id}', 'packing')">→ Under Packing</button>`;
        else if (st === "packing") btn = `<button onclick="go('${job.ID || job.id}', 'packed')">→ Packed</button>`;
        else btn = "Done";

        html += `<tr>
          <td>${job['P/I No.']||''}</td>
          <td><b>${job['PARTS No.']||''}</b></td>
          <td>${job['CUSTOMER No.']||''}</td>
          <td style="text-align:center">${job["Q'TY"]||''}</td>
          <td style="text-align:center">${job.Team||''}</td>
          <td style="text-align:center">${st.toUpperCase()}</td>
          <td style="text-align:center">${btn}</td>
        </tr>`;
      });
      document.getElementById("data").innerHTML = html;
    }

    async function go(id, status) {
      if (!confirm("Move to next step?")) return;
      await fetch(`${URL}?method=POST&action=update&id=${id}&status=${status}`);
      alert("✅ Updated!");
      load();
    }

    load();
    setInterval(load, 6000);
  </script>
</body>
</html>
