<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT - Packing</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
  <style>
    :root { --bg: #0a0a0a; --card: #1a1a1a; }
    body {
      background: var(--bg);
      color: white;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #333; padding: 14px; text-align: left; }
    tr:hover { background-color: #222; }
    .btn { padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <div style="max-width: 1400px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #dc2626; padding-bottom: 15px;">
      <h1 style="font-size: 2.5rem; font-weight: bold; color: #dc2626;">🚨 URGENT PACKING</h1>
      <div style="text-align: right;">
        <p style="color: #888;">Live from Google Sheet - Debug Mode</p>
        <p id="datetime" style="font-family: monospace;"></p>
      </div>
    </div>

    <div id="teamFilters" style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px;"></div>

    <div style="background: #1a1a1a; border-radius: 16px; overflow: auto;">
      <table>
        <thead>
          <tr style="background: #222;">
            <th>P/I No.</th>
            <th>PARTS No.</th>
            <th>CUSTOMER No.</th>
            <th style="text-align:center">Q'TY</th>
            <th style="text-align:center">TEAM</th>
            <th style="text-align:center">CURRENT STATUS</th>
            <th style="text-align:center">NEXT ACTION</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxK-VVvzX92Bc24X-PHYOe1TKjah9c3ICqsYZzOl-TzWRUJDbQFYySBM7uyev9NqQuf/exec";

    const steps = [
      { id: 'urgent', name: 'Urgent' },
      { id: 'laser', name: 'Send to Laser' },
      { id: 'packing', name: 'Under Packing' },
      { id: 'packed', name: 'Packed' }
    ];

    let jobs = [];
    let currentFilter = 'all';

    async function fetchJobs() {
      console.log("Fetching jobs...");
      try {
        const res = await fetch(`${WEB_APP_URL}?method=GET`);
        const text = await res.text();
        console.log("Response received:", text);
        jobs = JSON.parse(text);
        renderTable();
        renderTeamFilters();
      } catch (e) {
        console.error("Fetch error:", e);
        alert("Cannot load data from Google Sheet.");
      }
    }

    function renderTeamFilters() {
      const container = document.getElementById('teamFilters');
      let html = `<button onclick="filterByTeam('all')" class="btn" style="background:${currentFilter==='all'?'#dc2626':'#444'}">ALL TEAMS</button>`;
      ['A','B','C','D','E','F','G','H'].forEach(t => {
        html += `<button onclick="filterByTeam('${t}')" class="btn" style="background:${currentFilter===t?'#dc2626':'#444'}">TEAM ${t}</button>`;
      });
      container.innerHTML = html;
    }

    function filterByTeam(team) {
      currentFilter = team;
      renderTeamFilters();
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      let filtered = currentFilter === 'all' ? jobs : jobs.filter(j => (j.Team || j.team) === currentFilter);

      filtered.forEach(job => {
        const status = (job.Status || job.status || 'urgent').toString().toLowerCase().trim();
        const stepIndex = steps.findIndex(s => s.id === status);
        const nextStep = stepIndex < 3 ? steps[stepIndex + 1] : null;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td style="font-family:monospace">${job['P/I No.'] || ''}</td>
          <td style="font-weight:bold">${job['PARTS No.'] || ''}</td>
          <td>${job['CUSTOMER No.'] || ''}</td>
          <td style="text-align:center;font-weight:bold">${job["Q'TY"] || ''}</td>
          <td style="text-align:center">${job.Team || job.team || '—'}</td>
          <td style="text-align:center">${steps[stepIndex].name}</td>
          <td style="text-align:center">
            ${nextStep ? `<button onclick="moveToStep('${job.ID || job.id}', '${nextStep.id}')" class="btn" style="background:#16a34a">→ ${nextStep.name}</button>` : 'Completed'}
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    async function moveToStep(jobId, newStatus) {
      console.log("Attempting to update Job ID:", jobId, "to", newStatus);
      if (!confirm(`Move to "${newStatus}"?`)) return;

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: "update",
            id: jobId,
            status: newStatus,
            lastNote: `Moved to ${newStatus}`
          })
        });

        const result = await response.text();
        console.log("Update response:", result);

        alert("Update sent! Refreshing...");
        fetchJobs();
      } catch (e) {
        console.error("Update error:", e);
        alert("Update failed. Check console (F12) for details.");
      }
    }

    setInterval(fetchJobs, 8000);
    setInterval(() => {
      document.getElementById('datetime').textContent = new Date().toLocaleString();
    }, 1000);

    fetchJobs();
  </script>
</body>
</html>
