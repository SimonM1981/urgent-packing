<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URGENT PACKING</title>
  <style>
    body { background:#111; color:white; font-family:Arial, sans-serif; padding:20px; margin:0; }
    table { width:100%; border-collapse:collapse; background:#1f1f1f; }
    th, td { padding:12px; border:1px solid #444; text-align:left; }
    th { background:#222; }
    tr:hover { background:#292929; }
    button { 
      background:#22c55e; color:black; border:none; padding:10px 16px; 
      border-radius:8px; font-weight:bold; cursor:pointer; 
    }
  </style>
</head>
<body>

  <h1 style="color:#ef4444; text-align:center;">🚨 URGENT PACKING</h1>
  <p style="text-align:center; color:#aaa;">Click green button to move status</p>

  <div id="filters" style="text-align:center; margin:15px 0;"></div>

  <table>
    <thead>
      <tr>
        <th>P/I No.</th>
        <th>PARTS No.</th>
        <th>CUSTOMER</th>
        <th>Q'TY</th>
        <th>TEAM</th>
        <th>STATUS</th>
        <th>ACTION</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbxK-VVvzX92Bc24X-PHYOe1TKjah9c3ICqsYZzOl-TzWRUJDbQFYySBM7uyev9NqQuf/exec";

    async function load() {
      const res = await fetch(URL + "?method=GET");
      const jobs = await res.json();
      showTable(jobs);
    }

    function showTable(jobs) {
      let html = '';
      jobs.forEach(job => {
        const status = (job.Status || job.status || 'urgent').toLowerCase();
        let next = '';
        if (status === 'urgent') next = 'laser';
        else if (status === 'laser') next = 'packing';
        else if (status === 'packing') next = 'packed';

        html += `
          <tr>
            <td>${job['P/I No.'] || ''}</td>
            <td><b>${job['PARTS No.'] || ''}</b></td>
            <td>${job['CUSTOMER No.'] || ''}</td>
            <td style="text-align:center">${job["Q'TY"] || ''}</td>
            <td style="text-align:center">${job.Team || ''}</td>
            <td style="text-align:center">${status.toUpperCase()}</td>
            <td style="text-align:center">
              ${next ? `<button onclick="change('${job.ID || job.id}', '${next}')">→ NEXT</button>` : 'DONE'}
            </td>
          </tr>`;
      });
      document.getElementById('data').innerHTML = html;
    }

    async function change(id, newStatus) {
      if (!confirm("Change status?")) return;
      
      try {
        await fetch(`${URL}?method=POST&action=update&id=${id}&status=${newStatus}`);
        alert("✅ Updated! Refreshing...");
        load();
      } catch(e) {
        alert("Failed");
      }
    }

    // Load data
    load();
    setInterval(load, 8000);
  </script>
</body>
</html>
